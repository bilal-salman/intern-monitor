name: Internship Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # lets you trigger it manually from GitHub too

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor (single cycle)
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python internship_monitor.py --once

      - name: Save seen_jobs.json back to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "update seen jobs [skip ci]"
          git push
