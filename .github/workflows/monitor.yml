name: Internship Monitor

on:
  # Disabled for now — testing manually via workflow_dispatch first.
  # Uncomment once a manual test run succeeds cleanly, THEN re-enable
  # cron-job.org (or leave this off entirely and let cron-job.org be the
  # only trigger, since it's already hitting workflow_dispatch every 5 min —
  # running both this schedule AND cron-job.org double-fires the job).
  # schedule:
  #   - cron: '2,12,22,32,42,52 * * * *'   # every 10 min, offset from :00 to dodge peak-load delays
  workflow_dispatch:           # lets you trigger it manually from GitHub, and is what cron-job.org calls

concurrency:
  group: internship-monitor
  cancel-in-progress: false   # NEVER cancel an in-progress run — cancellation
                               # can interrupt mid-file-write and leave
                               # seen_jobs.json truncated to empty, which is
                               # what actually caused every "corrupted" incident
                               # tonight. Queue instead; timeout-minutes below
                               # is what protects against a genuinely stuck run.

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # auto-fails a genuinely hung run after 10 min,
                           # instead of blocking every future trigger forever
                           # (which is what happened before) — WITHOUT relying
                           # on cancellation, which is what caused the
                           # file-truncation corruption
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor (single cycle)
        working-directory: job-alerts
        env:
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:          ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          SHEETS_WEBHOOK_URL:    ${{ secrets.SHEETS_WEBHOOK_URL }}
          SHEETS_WEBHOOK_SECRET: ${{ secrets.SHEETS_WEBHOOK_SECRET }}
        run: python internship_monitor.py --once

      - name: Heartbeat (prevents 60-day inactivity auto-disable)
        working-directory: job-alerts
        run: |
          echo "last run: $(date -u)" > last_run.txt

      - name: Save seen_jobs.json + heartbeat back to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git pull --rebase --autostash
          git add job-alerts/seen_jobs.json job-alerts/last_run.txt
          if [ -f job-alerts/seen_jobs.json.bak ]; then
            git add job-alerts/seen_jobs.json.bak
          fi
          git diff --staged --quiet || git commit -m "update seen jobs + heartbeat [skip ci]"
          git push
